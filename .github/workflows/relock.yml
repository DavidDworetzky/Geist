# Temporary: regenerate uv.lock on a runner with access to download.pytorch.org.
# Deleted before the PR is opened; it never runs on main.
name: Relock dependencies

on:
  push:
    branches: [claude/review-open-prs-ekqyel]
    paths: ['pyproject.toml']

permissions:
  contents: write

jobs:
  relock:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        version: "0.9.5"

    - name: Regenerate lock file
      run: uv lock

    - name: Commit updated lock file
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add uv.lock
        if git diff --cached --quiet; then
          echo "uv.lock unchanged"
          exit 0
        fi
        git commit -m "Relock dependencies against the pytorch-cpu index"
        git push origin HEAD:${{ github.ref_name }}
