name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on PRs; let pushes to main run to completion
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:14.9
        env:
          POSTGRES_DB: geist
          POSTGRES_USER: geist
          POSTGRES_PASSWORD: geist
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v3.1.1
      with:
        python-version: '3.11'
        activate-environment: geist-linux-docker

    - name: Cache Conda environment
      uses: actions/cache@v4
      id: conda-cache
      with:
        path: ${{ env.CONDA }}/envs/geist-linux-docker
        key: conda-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('linux_environment_x86_x64.yml') }}

    - name: Install Conda environment
      if: steps.conda-cache.outputs.cache-hit != 'true'
      shell: bash -l {0}
      run: conda env update -n geist-linux-docker -f linux_environment_x86_x64.yml

    - name: Initialize database
      shell: bash -l {0}
      env:
        PYTHONPATH: ${{ github.workspace }}
        GEIST_DATABASE_PROVIDER: postgresql
        DB_HOST: localhost
        DB_PORT: 5432
        POSTGRES_DB: geist
        POSTGRES_USER: geist
        POSTGRES_PASSWORD: geist
      run: |
        python initdb.py

    - name: Run tests
      shell: bash -l {0}
      env:
        HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
        PYTHONPATH: ${{ github.workspace }}
        GEIST_DATABASE_PROVIDER: postgresql
        DB_HOST: localhost
        DB_PORT: 5432
        POSTGRES_DB: geist
        POSTGRES_USER: geist
        POSTGRES_PASSWORD: geist
      run: |
        pytest tests/

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: client/geist/package-lock.json

    - name: Install dependencies
      run: |
        cd client/geist
        npm ci

    - name: Run frontend tests
      run: |
        cd client/geist
        npm test -- --watchAll=false --passWithNoTests

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        python -m pip install --only-binary=:all: \
          bandit==1.9.4 \
          safety==3.8.1 \
          PyYAML==6.0.3

    - name: Run Bandit (Python SAST)
      run: |
        bandit -r . -f json -o bandit-report.json -c pyproject.toml || true
        if [ -f bandit-report.json ]; then
          echo "📊 Bandit Security Report:"
          python -m json.tool bandit-report.json || cat bandit-report.json
          # Report high severity issues but don't fail
          HIGH_SEVERITY=$(python -c "import json; data=json.load(open('bandit-report.json')); print(len([x for x in data.get('results', []) if x.get('issue_severity') == 'HIGH']))" 2>/dev/null || echo "0")
          if [ "$HIGH_SEVERITY" -gt "0" ]; then
            echo "⚠️ Found $HIGH_SEVERITY high severity security issues!"
          fi
        fi

    - name: Run Safety (Python Dependency Vulnerability Scan)
      run: |
        # Extract pip packages from conda environment file
        python -c "
        import yaml
        import sys
        with open('linux_environment_x86_x64.yml', 'r') as f:
            env = yaml.safe_load(f)
            pip_deps = env.get('dependencies', [])
            for dep in pip_deps:
                if isinstance(dep, dict) and 'pip' in dep:
                    for pkg in dep['pip']:
                        print(pkg)
        " > requirements-check.txt

        safety check --file requirements-check.txt --output json > safety-report.json || true
        if [ -f safety-report.json ]; then
          echo "🔒 Safety Vulnerability Report:"
          cat safety-report.json
        fi

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: NPM Audit (Frontend Dependencies)
      run: |
        cd client/geist
        npm ci --ignore-scripts --audit=false --fund=false
        npm audit --json > npm-audit-report.json || true
        echo "📦 NPM Audit Report:"
        cat npm-audit-report.json
        # Report vulnerabilities but don't fail
        CRITICAL=$(cat npm-audit-report.json | grep -o '"critical":[0-9]*' | cut -d':' -f2 || echo "0")
        if [ "$CRITICAL" != "0" ] && [ ! -z "$CRITICAL" ]; then
          echo "⚠️ Found $CRITICAL critical npm vulnerabilities!"
          npm audit || true
        fi

    - name: Upload Security Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
          client/geist/npm-audit-report.json

  container-security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner on Dockerfiles
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: 'config'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: Dockerfile
          - image: frontend
            dockerfile: client/geist/Dockerfile

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ${{ matrix.image }} image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        tags: geist-${{ matrix.image }}
        push: false
        load: true
        cache-from: type=gha,scope=${{ matrix.image }}
        cache-to: type=gha,mode=max,scope=${{ matrix.image }}

    - name: Run Trivy vulnerability scanner on ${{ matrix.image }} image
      uses: aquasecurity/trivy-action@v0.36.0
      continue-on-error: true
      with:
        scan-type: 'image'
        image-ref: 'geist-${{ matrix.image }}'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'
