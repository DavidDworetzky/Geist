name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on PRs; let pushes to main run to completion
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:14.9
        env:
          POSTGRES_DB: geist
          POSTGRES_USER: geist
          POSTGRES_PASSWORD: geist
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v3.1.1
      with:
        python-version: '3.11'
        activate-environment: geist-linux-docker

    - name: Cache Conda environment
      uses: actions/cache@v4
      id: conda-cache
      with:
        path: ${{ env.CONDA }}/envs/geist-linux-docker
        key: conda-env-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('linux_environment_x86_x64.yml') }}

    - name: Install Conda environment
      if: steps.conda-cache.outputs.cache-hit != 'true'
      shell: bash -l {0}
      run: conda env update -n geist-linux-docker -f linux_environment_x86_x64.yml

    - name: Initialize database
      shell: bash -l {0}
      env:
        PYTHONPATH: ${{ github.workspace }}
        DB_HOST: localhost
        DB_PORT: 5432
        POSTGRES_DB: geist
        POSTGRES_USER: geist
        POSTGRES_PASSWORD: geist
      run: |
        python initdb.py

    - name: Run tests
      shell: bash -l {0}
      env:
        HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
        PYTHONPATH: ${{ github.workspace }}
        DB_HOST: localhost
        DB_PORT: 5432
        POSTGRES_DB: geist
        POSTGRES_USER: geist
        POSTGRES_PASSWORD: geist
      run: |
        pytest tests/

  frontend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: client/geist/package-lock.json

    - name: Install dependencies
      run: |
        cd client/geist
        npm ci

    - name: Run frontend tests
      run: |
        cd client/geist
        npm test -- --watchAll=false --passWithNoTests

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: Dockerfile
          - image: frontend
            dockerfile: client/geist/Dockerfile

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ${{ matrix.image }} image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        tags: geist-${{ matrix.image }}
        push: false
        cache-from: type=gha,scope=${{ matrix.image }}
        cache-to: type=gha,mode=max,scope=${{ matrix.image }}
