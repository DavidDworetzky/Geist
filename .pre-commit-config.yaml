# Pre-commit hooks configuration
# See https://pre-commit.com for more information
repos:
  # Local supply-chain policy checks
  - repo: local
    hooks:
      - id: dependency-supply-chain-policy
        name: dependency supply-chain policy
        entry: python scripts/verify_dependency_policy.py
        language: system
        pass_filenames: false
        files: '(^client/geist/package(-lock)?\.json$|^client/geist/Dockerfile$|^.*environment.*\.yml$|^scripts/verify_dependency_policy\.py$)'

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Prevent large files from being committed
      - id: check-added-large-files
        args: ['--maxkb=1000']
      # Check for files that would conflict in case-insensitive filesystems
      - id: check-case-conflict
      # Check for merge conflicts
      - id: check-merge-conflict
      # Check yaml files are valid
      - id: check-yaml
        exclude: '^(linux_environment|mac_environment|conda).*\.yml$'
      # Check toml files are valid
      - id: check-toml
      # Detect private keys
      - id: detect-private-key
      # Ensure files end with a newline
      - id: end-of-file-fixer
      # Remove trailing whitespace
      - id: trailing-whitespace
      # Normalize mixed line endings
      - id: mixed-line-ending

  # Ruff - Fast Python linter and formatter (replaces black, isort, flake8, etc.)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter
      - id: ruff
        name: ruff linting
        args: [--fix]
      # Run the formatter
      - id: ruff-format
        name: ruff formatting

  # Python type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy type checking
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - types-requests
          - types-PyYAML
          - types-six
          - types-python-dateutil
          - pydantic>=2.0
          - sqlalchemy>=2.0
          - fastapi>=0.100
        exclude: '^(tests/|scripts/|migrations/)'
        # Run mypy only on Python files that are tracked by git
        pass_filenames: true
        files: \.py$

  # Python SAST scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ["bandit[toml]"]

  # Python dependency vulnerability scanning
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        files: linux_environment.*\.yml$

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--format, parsable, --strict]

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker

  # Repo-local checks that avoid adding runtime dependencies.
  - repo: local
    hooks:
      - id: staged-secret-scan
        name: staged secret scan
        entry: python scripts/pre_commit_security_check.py
        language: system
        pass_filenames: false

      - id: frontend-eslint
        name: frontend eslint
        entry: bash scripts/pre_commit_frontend_lint.sh
        language: system
        pass_filenames: false
        files: ^client/geist/src/.*\.(js|jsx|ts|tsx)$
